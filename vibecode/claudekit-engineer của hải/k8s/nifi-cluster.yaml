apiVersion: nifi.konpyutaika.com/v1
kind: NifiCluster
metadata:
  name: nifi-cluster
  namespace: nifi
spec:
  clusterImage: "apache/nifi:2.6.0"
  initContainerImage: "bash:5.2.2"
  clusterManager: kubernetes
  oneNifiNodePerNode: false
  propagateLabels: true

  service:
    headlessEnabled: true
    annotations:
      service.alpha.kubernetes.io/tolerate-unready-endpoints: "true"

  readOnlyConfig:
    nifiProperties:
      overrideConfigs: |
        nifi.sensitive.props.key=nifikop-poc-sensitive-key-2026
        nifi.web.http.host=0.0.0.0

  nifiClusterTaskSpec:
    retryDurationMinutes: 15

  listenersConfig:
    internalListeners:
      - containerPort: 8080
        type: http
        name: http
      - containerPort: 6007
        type: cluster
        name: cluster
      - containerPort: 10000
        type: s2s
        name: s2s
      - containerPort: 6342
        type: load-balance
        name: load-balance

  nodeConfigGroups:
    default_group:
      imagePullPolicy: IfNotPresent
      isNode: true
      serviceAccountName: default
      resourcesRequirements:
        requests:
          cpu: "1"
          memory: 2Gi
        limits:
          cpu: "2"
          memory: 4Gi
      storageConfigs:
        - mountPath: "/opt/nifi/data"
          name: data
          pvcSpec:
            accessModes:
              - ReadWriteOnce
            storageClassName: "gp2"
            resources:
              requests:
                storage: 10Gi
        - mountPath: "/opt/nifi/nifi-current/logs"
          name: logs
          pvcSpec:
            accessModes:
              - ReadWriteOnce
            storageClassName: "gp2"
            resources:
              requests:
                storage: 10Gi
        - mountPath: "/opt/nifi/flowfile_repository"
          name: flowfile-repo
          pvcSpec:
            accessModes:
              - ReadWriteOnce
            storageClassName: "gp2"
            resources:
              requests:
                storage: 10Gi
        - mountPath: "/opt/nifi/content_repository"
          name: content-repo
          pvcSpec:
            accessModes:
              - ReadWriteOnce
            storageClassName: "gp2"
            resources:
              requests:
                storage: 10Gi
        - mountPath: "/opt/nifi/provenance_repository"
          name: provenance-repo
          pvcSpec:
            accessModes:
              - ReadWriteOnce
            storageClassName: "gp2"
            resources:
              requests:
                storage: 10Gi
  nodes:
    - id: 0
      nodeConfigGroup: "default_group"
