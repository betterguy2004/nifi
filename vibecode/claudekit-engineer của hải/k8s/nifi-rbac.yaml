# RBAC for NiFi pods — allows Kubernetes leader election via Leases
# Required when clusterManager: kubernetes (NiFi 2.x)
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: nifi-leader-election
  namespace: nifi
rules:
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: nifi-leader-election
  namespace: nifi
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: nifi-leader-election
subjects:
  - kind: ServiceAccount
    name: default
    namespace: nifi
