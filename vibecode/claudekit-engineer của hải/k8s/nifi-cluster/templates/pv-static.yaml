{{- /*
Static PersistentVolumes for NiFi cluster using NFS backend.
These PVs are intentionally static to ensure data persistence across pod restarts.
When a pod is deleted and recreated, the PVC will automatically bind to the same PV,
preserving all NiFi data, flowfiles, content, and provenance.

The template generates one PV per node and per storage config.
Each node gets its own NFS folder to avoid overlap:
<nfsBasePath>/node-<id>/<storage-name>
*/ -}}

{{- $root := . -}}
{{- $fullname := include "nifi-cluster.fullname" $root -}}
{{- range $node := $root.Values.cluster.nodes }}
{{- $groupName := $node.nodeConfigGroup -}}
{{- $groupConfig := index $root.Values.cluster.nodeConfigGroups $groupName -}}
{{- if and $groupConfig $groupConfig.storageConfigs }}
{{- range $storage := $groupConfig.storageConfigs }}
---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: {{ printf "%s-%v-%s-pv" $fullname $node.id $storage.name | trunc 63 | trimSuffix "-" }}
  labels:
    app: {{ include "nifi-cluster.name" $root }}
    chart: {{ include "nifi-cluster.chart" $root }}
    release: {{ $root.Release.Name }}
    heritage: {{ $root.Release.Service }}
    pv-node-id: {{ $node.id | quote }}
    pv-storage-name: {{ $storage.name | quote }}
spec:
  # storageClassName must be "" to prevent default StorageClass assignment
  # This ensures PVC binds to this static PV instead of triggering dynamic provisioning
  storageClassName: ""
  capacity:
    storage: {{ default "10Gi" (index $storage.pvcSpec.resources.requests "storage") }}
  accessModes:
    {{- if $storage.pvcSpec.accessModes }}
    {{- toYaml $storage.pvcSpec.accessModes | nindent 4 }}
    {{- else }}
    - ReadWriteOnce
    {{- end }}
  persistentVolumeReclaimPolicy: {{ default "Retain" $storage.reclaimPolicy }}
  nfs:
    server: {{ $root.Values.nfsServer | quote }}
    path: {{ printf "%s/node-%v/%s" $root.Values.nfsBasePath $node.id $storage.name | quote }}
  claimRef:
    namespace: {{ $root.Release.Namespace }}
    name: {{ printf "%s-%v-%s" $fullname $node.id $storage.name | trunc 253 | trimSuffix "-" }}
{{- end }}
{{- end }}
{{- end }}
