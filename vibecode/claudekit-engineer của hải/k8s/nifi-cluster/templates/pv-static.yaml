{{- /*
Static PersistentVolumes for NiFi cluster using NFS backend.
These PVs are intentionally static to ensure data persistence across pod restarts.
When a pod is deleted and recreated, the PVC will automatically bind to the same PV,
preserving all NiFi data, flowfiles, content, and provenance.
*/ -}}

---
# PersistentVolume for NiFi data directory
apiVersion: v1
kind: PersistentVolume
metadata:
  name: {{ include "nifi-cluster.fullname" . }}-data-pv
  namespace: {{ .Release.Namespace }}
  labels:
    app: {{ include "nifi-cluster.name" . }}
    chart: {{ include "nifi-cluster.chart" . }}
    release: {{ .Release.Name }}
    heritage: {{ .Release.Service }}
    pv-type: nifi-data
spec:
  capacity:
    storage: 10Gi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  nfs:
    server: {{ .Values.nfsServer | quote }}
    
    path: {{ .Values.nfsBasePath }}/data
  claimRef:
    namespace: {{ .Release.Namespace }}
    name: {{ include "nifi-cluster.fullname" . }}-0-data

