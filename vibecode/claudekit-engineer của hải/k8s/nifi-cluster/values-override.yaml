
# NiFi Cluster Helm values override for POC
# Overrides upstream nifi-cluster chart defaults for NiFi 2.6.0 on Kubernetes manager
# Usage: helm install nifi-cluster ./k8s/nifi-cluster -f ./k8s/values-nifi-cluster.yaml -n nifi

# NFS Configuration for Static PersistentVolumes
nfsServer: "10.88.232.89"
nfsBasePath: "/data/nfs"

cluster:
  manager: kubernetes
  pod: {}
  service:
    headlessEnabled: true
    annotations:
      service.alpha.kubernetes.io/tolerate-unready-endpoints: "true"
  image:
    tag: "2.6.0"
  nifiProperties:
    overrideConfigs: |
      nifi.sensitive.props.key=nifikop-poc-sensitive-key-2026
      nifi.web.http.host=0.0.0.0
      nifi.web.proxy.context.path=/nifi-cluster
    webProxyHosts:
      - "localhost:8080"
      - "127.0.0.1:8080"
  nodeConfigGroups:
    default_group:
      isNode: true
      imagePullPolicy: IfNotPresent
      serviceAccountName: "nifi-cluster"
      resourcesRequirements:
        requests:
          cpu: "1"
          memory: 2Gi
        limits:
          cpu: "2"
          memory: 4Gi
      # reclaimPolicy: Retain ensures PVCs survive pod deletion
      # PVCs will automatically bind to the Static PersistentVolumes defined in templates/pv-static.yaml
      # When a pod is deleted and recreated, it will use the same PVC and thus the same NFS storage
      storageConfigs:
        - mountPath: "/opt/nifi/data"
          name: data
          reclaimPolicy: Retain
          pvcSpec:
            accessModes: [ReadWriteOnce]
            resources:
              requests:
                storage: 10Gi
        - mountPath: "/opt/nifi/nifi-current/logs"
          name: logs
          reclaimPolicy: Retain
          pvcSpec:
            accessModes: [ReadWriteOnce]
            resources:
              requests:
                storage: 10Gi
        - mountPath: "/opt/nifi/flowfile_repository"
          name: flowfile-repo
          reclaimPolicy: Retain
          pvcSpec:
            accessModes: [ReadWriteOnce]
            resources:
              requests:
                storage: 10Gi
        - mountPath: "/opt/nifi/content_repository"
          name: content-repo
          reclaimPolicy: Retain
          pvcSpec:
            accessModes: [ReadWriteOnce]
            resources:
              requests:
                storage: 10Gi
        - mountPath: "/opt/nifi/provenance_repository"
          name: provenance-repo
          reclaimPolicy: Retain
          pvcSpec:
            accessModes: [ReadWriteOnce]
            resources:
              requests:
                storage: 10Gi
  retryDurationMinutes: 15
  nodes:
    - id: 0
      nodeConfigGroup: "default_group"
  listenersConfig:
    internalListeners:
      - type: "http"
        name: "http"
        containerPort: 8080
      - type: "cluster"
        name: "cluster"
        containerPort: 6007
      - type: "s2s"
        name: "s2s"
        containerPort: 10000
      - type: "load-balance"
        name: "load-balance"
        containerPort: 6342
  externalServices:
    - name: "nifi-cluster-ip"
      spec:
        type: ClusterIP
        portConfigs:
          - port: 8080
            internalListenerName: "http"
      metadata:
        labels: {}
        annotations: {}

zookeeper:
  enabled: false
