
# NiFi Cluster Helm values override for POC
# Overrides upstream nifi-cluster chart defaults for NiFi 2.6.0 on Kubernetes manager
# Usage: helm install nifi-cluster ./k8s/nifi-cluster -f ./k8s/values-nifi-cluster.yaml -n nifi

cluster:
  manager: kubernetes
  pod: {}
  service:
    headlessEnabled: true
    annotations:
      service.alpha.kubernetes.io/tolerate-unready-endpoints: "true"
  image:
    tag: "2.6.0"
  nifiProperties:
    overrideConfigs: |
      nifi.sensitive.props.key=nifikop-poc-sensitive-key-2026
      nifi.web.http.host=0.0.0.0
      nifi.web.proxy.context.path=/nifi-cluster
    webProxyHosts:
      - "localhost:8080"
      - "127.0.0.1:8080"
  nodeConfigGroups:
    # Per-node config groups ensure each node mounts its own NFS subdirectory.
    # Data lives on NFS server and survives pod delete, helm uninstall, cluster rebuild.
    # No PV/PVC needed — NiFiKop mounts NFS volumes directly via externalVolumeConfigs.
    #
    # To add node 1: copy node_0_group → node_1_group, change paths to node-1/*, add to nodes list.
    node_0_group:
      isNode: true
      imagePullPolicy: IfNotPresent
      serviceAccountName: "nifi-cluster"
      resourcesRequirements:
        requests:
          cpu: "1"
          memory: 2Gi
        limits:
          cpu: "2"
          memory: 4Gi
      externalVolumeConfigs:
        - name: data
          mountPath: "/opt/nifi/data"
          nfs:
            server: "10.88.232.89"
            path: "/data/nfs/node-0/data"
        - name: logs
          mountPath: "/opt/nifi/nifi-current/logs"
          nfs:
            server: "10.88.232.89"
            path: "/data/nfs/node-0/logs"
        - name: flowfile-repo
          mountPath: "/opt/nifi/flowfile_repository"
          nfs:
            server: "10.88.232.89"
            path: "/data/nfs/node-0/flowfile-repo"
        - name: content-repo
          mountPath: "/opt/nifi/content_repository"
          nfs:
            server: "10.88.232.89"
            path: "/data/nfs/node-0/content-repo"
        - name: provenance-repo
          mountPath: "/opt/nifi/provenance_repository"
          nfs:
            server: "10.88.232.89"
            path: "/data/nfs/node-0/provenance-repo"
  retryDurationMinutes: 15
  nodes:
    - id: 0
      nodeConfigGroup: "node_0_group"
  listenersConfig:
    internalListeners:
      - type: "http"
        name: "http"
        containerPort: 8080
      - type: "cluster"
        name: "cluster"
        containerPort: 6007
      - type: "s2s"
        name: "s2s"
        containerPort: 10000
      - type: "load-balance"
        name: "load-balance"
        containerPort: 6342
  externalServices:
    - name: "nifi-cluster-ip"
      spec:
        type: ClusterIP
        portConfigs:
          - port: 8080
            internalListenerName: "http"
      metadata:
        labels: {}
        annotations: {}

zookeeper:
  enabled: false
